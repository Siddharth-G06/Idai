name: Vaakazhipeer CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    name: Build Frontend (Vite/React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Vite App
        working-directory: ./frontend
        run: npm run build

  test-backend:
    name: Test Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check application syntax
        working-directory: ./backend
        run: |
          # Verify that main.py can be imported without crashing
          python -c "import main; print('Backend syntax ok')"

  deploy:
    name: Deploy to Render
    needs: [build-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          echo "Triggering Render deployment hook..."
          curl -X GET "https://api.render.com/deploy/srv-d7bjepvkijhs73ao3fvg?key=bRbhFEzYnJ4"
